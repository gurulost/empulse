name: CI

on:
    push:
    pull_request:

jobs:
    test:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.2'
                  extensions: bcmath, ctype, dom, fileinfo, mbstring, pdo_sqlite, sqlite3
                  coverage: none

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: npm

            - name: Prepare environment
              run: |
                  cp .env.example .env
                  mkdir -p database
                  touch database/database.sqlite
                  {
                    echo "APP_ENV=testing"
                    echo "APP_DEBUG=true"
                    echo "APP_URL=http://127.0.0.1:8000"
                    echo "DB_CONNECTION=sqlite"
                    echo "DB_DATABASE=${GITHUB_WORKSPACE}/database/database.sqlite"
                    echo "CACHE_DRIVER=file"
                    echo "QUEUE_CONNECTION=sync"
                    echo "SESSION_DRIVER=file"
                    echo "MAIL_MAILER=array"
                  } >> .env

            - name: Install PHP dependencies
              run: composer install --no-interaction --prefer-dist --optimize-autoloader

            - name: Install Node dependencies
              run: npm ci

            - name: Generate key and migrate
              run: |
                  php artisan key:generate
                  php artisan migrate --force
                  php artisan db:seed --force

            - name: Run backend tests
              run: php artisan test

            - name: Run frontend lint
              run: npm run lint

            - name: Build frontend assets
              run: npm run build

            - name: Install Playwright browser
              run: npx playwright install --with-deps chromium

            - name: Start application server
              run: php artisan serve --host=127.0.0.1 --port=8000 > storage/logs/ci-server.log 2>&1 &

            - name: Run Playwright smoke tests
              env:
                  PLAYWRIGHT_BASE_URL: http://127.0.0.1:8000
              run: npm run test:e2e
